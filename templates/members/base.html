{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="个人简历展示 — 基于Django的动态个人主页">
  <title>{% block title %}个人简历{% endblock %}</title>

  <!-- Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300..700&family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body {% block body_attrs %}{% endblock %}>
  <!-- Header -->
  {% block header %}
  <header class="site-header">
    <div class="container">
      <a href="{% url 'members:verify' %}" class="logo" aria-label="首页">
        <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="24" height="24" rx="4"/>
          <path d="M9 10h10M9 14h7M9 18h4"/>
          <circle cx="20" cy="18" r="3" fill="currentColor" stroke="none" opacity="0.3"/>
        </svg>
        个人简历
      </a>
      <div class="header-actions">
        <button data-theme-toggle aria-label="切换主题"></button>
        {% if verified %}
        <a href="{% url 'members:logout' %}" class="btn-logout">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          退出
        </a>
        {% endif %}
      </div>
    </div>
  </header>
  {% endblock %}

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__content">
        <span class="site-footer__dot"></span>
        <p>基于 Python + Django 构建 &middot; SQLite3 数据库</p>
      </div>
    </div>
  </footer>

  <script src="{% static 'js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
