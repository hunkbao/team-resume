<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人名片 | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0F0F0F;
            --text-color: #F5F5F5;
            --text-muted: #888888;
            --accent-color: #00E5FF;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 噪声纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        /* 弥散光斑背景 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            transition: transform 0.3s ease-out;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            top: -100px;
            right: -100px;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: #7B61FF;
            bottom: -50px;
            left: -50px;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            padding: 2rem;
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 头部区域 */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease forwards;
        }

        /* 头像 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 1.5rem;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .avatar::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #7B61FF, var(--accent-color));
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
        }

        .avatar-text {
            font-size: 2.5rem;
            font-weight: 800;
        }

        /* 名字 */
        .name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        /* 打字机效果 */
        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tagline-text {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--accent-color);
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        /* 社交链接卡片 */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(30px);
        }

        .link-card:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px var(--accent-glow);
        }

        .link-card:nth-child(1) { animation: fadeInUp 0.8s ease 0.2s forwards; }
        .link-card:nth-child(2) { animation: fadeInUp 0.8s ease 0.3s forwards; }
        .link-card:nth-child(3) { animation: fadeInUp 0.8s ease 0.4s forwards; }
        .link-card:nth-child(4) { animation: fadeInUp 0.8s ease 0.5s forwards; }
        .link-card:nth-child(5) { animation: fadeInUp 0.8s ease 0.6s forwards; }

        .link-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .link-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
        }

        .link-info {
            display: flex;
            flex-direction: column;
        }

        .link-platform {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .link-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .link-arrow {
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-arrow {
            color: var(--accent-color);
            transform: translate(3px, -3px);
        }

        /* 底部 */
        .footer {
            margin-top: 4rem;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease 0.8s forwards;
        }

        .footer-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .clock {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .clock-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* 动画 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: var(--accent-color); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }

            .name {
                font-size: 1.6rem;
            }

            .link-card {
                padding: 1rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

            <div class="tagline">
                <span class="tagline-text">正在探索数字世界的创作者 / 独立开发者</span>

        </div>

        <!-- 社交链接卡片 -->
        <div class="links">

                    <div class="link-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405 1.02 0 2.04.135 3 .405 2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.285 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                    </div>
                    <div class="link-info">
                        <span class="link-platform">GitHub</span>
                        <span class="link-id">@yourusername</span>
                    </div>
                </div>
                <div class="link-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <a href="https://twitter.com/yourusername" target="_blank" class="link-card">
                <div class="link-left">
                    <div class="link-icon">

                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                        </svg>
                    </div>
                    <div class="link-info">
                        <span class="link-platform">X / Twitter</span>
                        <span class="link-id">@yourusername</span>
                    </div>
                </div>
                <div class="link-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 17L17 7M17 7H7M17 7V17"/>
                    </svg>
                </div>
            </a>

            <a href="https://instagram.com/yourusername" target="_blank" class="link-card">
                <div class="link-left">
                    <div class="link-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>

                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                        </svg>
                    </div>
                    <div class="link-info">
                        <span class="link-platform">Instagram</span>
                        <span class="link-id">@yourusername</span>
                    </div>
                </div>
                <div class="link-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 17L17 7M17 7H7M17 7V17"/>
                    </svg>
                </div>
            </a>

            <a href="https://linkedin.com/in/yourusername" target="_blank" class="link-card">
                <div class="link-left">
                    <div class="link-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <a href="mailto:your.email@example.com" class="link-card">
                <div class="link-left">
                    <div class="link-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>

        <!-- 底部 -->
        <div class="footer">
            <p class="footer-text">© 2026 YourName. Built with Passion.</p>
            <div class="clock">
                <div class="clock-dot"></div>
                <span id="timezone"></span>
            </div>
        </div>
    </div>

    <script>
        // 实时时钟
        function updateClock() {
            const now = new Date();
            const options = {
                timeZone: 'Asia/Shanghai',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const time = now.toLocaleTimeString('zh-CN', options);
            const date = now.toLocaleDateString('zh-CN', {
                timeZone: 'Asia/Shanghai',
                month: 'short',
                day: 'numeric',
                weekday: 'short'
            });
            document.getElementById('timezone').textContent = `Shanghai · ${date} · ${time}`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // 鼠标跟随光斑效果
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.glow-orb');
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;

            orbs.forEach((orb, index) => {
                const factor = index === 0 ? 1 : -0.7;
                orb.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
            });
        });
    </script>
</body>
</html>
